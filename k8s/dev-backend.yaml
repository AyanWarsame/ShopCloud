apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    environment: development

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopcloud-backend-config
  namespace: dev
data:
  DJANGO_SETTINGS_MODULE: config.settings.development
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  POSTGRES_DB: shopcloud_dev
  REDIS_URL: "redis://redis-service:6379/0"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://frontend-service.dev.svc.cluster.local"
  ALLOWED_HOSTS: "localhost,127.0.0.1,backend-service.dev.svc.cluster.local"

---
apiVersion: v1
kind: Secret
metadata:
  name: shopcloud-backend-secrets
  namespace: dev
type: Opaque
data:
  DJANGO_SECRET_KEY: ZGphbmdvLWluc2VjdXJlLWxvY2FsLWRldmVsb3BtZW50LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==  # base64
  POSTGRES_PASSWORD: c2hvcGNsb3VkZGV2  # shopclouddev
  STRIPE_SECRET_KEY: "" # Add your Stripe key
  STRIPE_WEBHOOK_SECRET: "" # Add your Stripe webhook secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev
  labels:
    app: backend
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        environment: development
    spec:
      containers:
      - name: backend
        image: $AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/shopcloud-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: shopcloud-backend-config
        - secretRef:
            name: shopcloud-backend-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: dev
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
