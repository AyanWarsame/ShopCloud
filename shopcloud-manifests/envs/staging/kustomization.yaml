apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shopcloud-staging
resources:
  - ../base
images:
  - name: shopcloud-backend
    newName: REPLACE_WITH_ECR_BACKEND_URL
    newTag: REPLACE_WITH_IMAGE_TAG
  - name: shopcloud-frontend
    newName: REPLACE_WITH_ECR_FRONTEND_URL
    newTag: REPLACE_WITH_IMAGE_TAG

commonLabels:
  environment: staging
  app: shopcloud
