name: ShopCloud CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 136906334786
  CLUSTER_NAME: shopcloud-cluster

jobs:

  # ─── 1. TERRAFORM ────────────────────────────────────────────
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      ecr_backend_url:  ${{ steps.outputs.outputs.ecr_backend_url }}
      ecr_frontend_url: ${{ steps.outputs.outputs.ecr_frontend_url }}
      cluster_name:     ${{ steps.outputs.outputs.cluster_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform init
        working-directory: infra/envs/dev
        run: terraform init

      - name: Terraform apply
        working-directory: infra/envs/dev
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Capture outputs
        id: outputs
        working-directory: infra/envs/dev
        run: |
          echo "ecr_backend_url=$(terraform output -raw ecr_backend_url)"   >> $GITHUB_OUTPUT
          echo "ecr_frontend_url=$(terraform output -raw ecr_frontend_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw eks_cluster_name)"     >> $GITHUB_OUTPUT

  # ─── 2. INSTALL ARGOCD + KARGO ───────────────────────────────
  bootstrap-cluster:
    name: Bootstrap ArgoCD + Kargo
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.terraform.outputs.cluster_name }}

      - name: Install ArgoCD (idempotent)
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=180s

      - name: Apply ArgoCD app manifests
        run: |
          kubectl apply -f argocd/apps/shopcloud-dev.yaml
          kubectl apply -f argocd/apps/shopcloud-staging.yaml
          kubectl apply -f argocd/apps/shopcloud-prod.yaml

      - name: Install Kargo (idempotent)
        run: |
          kubectl create namespace kargo --dry-run=client -o yaml | kubectl apply -f -
          helm repo add kargo https://charts.kargo.io
          helm repo update
          helm upgrade --install kargo kargo/kargo \
            --namespace kargo \
            --wait --timeout 180s

      - name: Apply Kargo resources
        run: |
          kubectl apply -f kargo/warehouse.yaml
          kubectl apply -f kargo/analysis-template.yaml
          kubectl apply -f kargo/stages.yaml

  # ─── 3. BUILD + PUSH IMAGES ──────────────────────────────────
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and push backend
        run: |
          docker build -t ${{ needs.terraform.outputs.ecr_backend_url }}:${{ github.sha }} ./backend
          docker push ${{ needs.terraform.outputs.ecr_backend_url }}:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build -t ${{ needs.terraform.outputs.ecr_frontend_url }}:${{ github.sha }} ./frontend
          docker push ${{ needs.terraform.outputs.ecr_frontend_url }}:${{ github.sha }}

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.terraform.outputs.ecr_backend_url }}:${{ github.sha }}
          exit-code: 0
          severity: CRITICAL

  # ─── 4. UPDATE MANIFESTS ─────────────────────────────────────
  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [terraform, build]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write image tags into dev overlay
        run: |
          cd shopcloud-manifests/envs/dev
          sed -i "s|newTag:.*|newTag: ${{ github.sha }}|g" kustomization.yaml
          sed -i "s|REPLACE_WITH_ECR_BACKEND_URL|${{ needs.terraform.outputs.ecr_backend_url }}|g" kustomization.yaml
          sed -i "s|REPLACE_WITH_ECR_FRONTEND_URL|${{ needs.terraform.outputs.ecr_frontend_url }}|g" kustomization.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add shopcloud-manifests/envs/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update dev image tag to ${{ github.sha }}"
          git push

  # ─── 5. PROMOTE VIA KARGO ────────────────────────────────────
  promote:
    name: Kargo Promote dev → staging
    runs-on: ubuntu-latest
    needs: [bootstrap-cluster, update-manifests]

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Install Kargo CLI
        run: |
          curl -Lo /usr/local/bin/kargo \
            https://github.com/akuity/kargo/releases/latest/download/kargo-linux-amd64
          chmod +x /usr/local/bin/kargo

      - name: Log in to Kargo
        run: |
          kargo login ${{ secrets.KARGO_API_URL }} \
            --token ${{ secrets.KARGO_API_TOKEN }} \
            --insecure-skip-tls-verify

      - name: Promote dev → staging
        run: |
          kargo promote \
            --project kargo \
            --stage dev \
            --freight-from-warehouse shopcloud

          kargo wait --project kargo --stage dev --timeout 5m

          kargo promote \
            --project kargo \
            --stage staging \
            --freight-from-stage dev
